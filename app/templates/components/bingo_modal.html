<div class="modal-scrim">
    <div class="modal-card">
        <div class="modal-badge">05</div>
        <h2 class="modal-title">BINGO!</h2>
        <p class="modal-copy">
            You completed a line. Keep the board open, keep the room in motion, and see how many more real connections you can pull into the game.
        </p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="modal-button">
            Keep Playing
        </button>

        <p class="footer-note">Signal locked. Mission continues.</p>
    </div>
</div>
