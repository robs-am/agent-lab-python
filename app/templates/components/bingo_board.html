<div class="board-grid">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="board-tile{% if square.is_marked %} board-tile-marked{% endif %}{% if is_winning %} board-tile-winning{% endif %}{% if square.is_free_space %} board-tile-free{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="board-tile-top">
            <span>{% if square.is_free_space %}Center{% else %}Cell {{ '%02d' % (square.id + 1) }}{% endif %}</span>
            <span class="board-tile-mark">
                {% if square.is_free_space %}★{% elif square.is_marked %}✓{% else %}○{% endif %}
            </span>
        </span>
        <span class="board-tile-label">{{ square.text }}</span>
    </button>
    {% endfor %}
</div>
